# OperAID Suite: Temperature sweep for a single model
# Tests how temperature affects remediation success.
# Each experiment overrides the common temperature.
name: temperature-sweep

common:
  profile: open5gs
  scenarios: [1, 2, 3]
  runs_per_scenario: 10
  max_turns: 3
  model: "qwen/qwen3.5-35b-a3b"
  base_url: "https://openrouter.ai/api/v1"
  custom_tools: []

experiments:
  - name: "qwen3.5-35b-t0.0"
    use_tools: true
    temperature: 0.0

  - name: "qwen3.5-35b-t0.3"
    use_tools: true
    temperature: 0.3

  - name: "qwen3.5-35b-t0.7"
    use_tools: true
    temperature: 0.7

  - name: "qwen3.5-35b-t1.0"
    use_tools: true
    temperature: 1.0
