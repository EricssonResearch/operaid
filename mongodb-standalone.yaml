apiVersion: apps/v1
kind: Deployment
metadata:
  name: open5gs-mongodb
  namespace: open5gs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        app.kubernetes.io/name: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:5.0
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: data
          mountPath: /data/db
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: open5gs-mongodb
  namespace: open5gs
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
